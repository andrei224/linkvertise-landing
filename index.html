<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Access Key</title>
    <style>
        body {
            background: #0a0a0a;
            color: #00ff00;
            text-align: center;
            padding: 50px;
            font-family: Arial, sans-serif;
        }
        .key-box {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            border: 2px solid #00ff00;
            display: inline-block;
            margin: 20px auto;
            max-width: 90%;
        }
        .key {
            font-size: 28px;
            font-weight: bold;
            font-family: monospace;
            background: #000;
            padding: 20px 30px;
            border-radius: 5px;
            border: 1px solid #00ff00;
            word-break: break-all;
            max-width: 500px;
        }
        .instructions {
            color: #aaa;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>🔑 Your Access Key</h1>
    <div id="container">
        <div class="key-box">
            <div class="key" id="keyDisplay">Loading...</div>
        </div>
        <div class="instructions">
            <p>Copy this key and return to Discord.</p>
            <p>Use <code>/redeem YOUR_KEY</code> to activate.</p>
            <p style="color:#666; font-size:12px; margin-top:20px;">⏰ This key expires in 4 hours.</p>
        </div>
    </div>

    <script>
        // Get the key from the URL path
        const path = window.location.pathname;
        const key = path.split('/').pop();
        
        const display = document.getElementById('keyDisplay');
        
        if (key && key.length > 0 && key !== 'index.html' && key !== '') {
            display.textContent = key;
            display.style.color = '#00ff00';
        } else {
            display.textContent = '⚠️ No Key Found';
            display.style.color = '#ff4444';
        }
        
        // Remove the key from the URL bar
        const cleanUrl = window.location.origin + window.location.pathname.replace(/\/[^\/]+$/, '/');
        if (window.history && window.history.replaceState) {
            window.history.replaceState({}, document.title, cleanUrl);
        }
    </script>
</body>
</html>
