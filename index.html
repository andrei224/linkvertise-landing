<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Access Key</title>
    <style>
        body {
            background: #0a0a0a;
            color: #00ff00;
            text-align: center;
            padding: 50px;
            font-family: Arial, sans-serif;
        }
        .key-box {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            border: 2px solid #00ff00;
            display: inline-block;
            margin: 20px auto;
            max-width: 90%;
        }
        .key {
            font-size: 28px;
            font-weight: bold;
            font-family: monospace;
            background: #000;
            padding: 20px 30px;
            border-radius: 5px;
            border: 1px solid #00ff00;
            word-break: break-all;
            max-width: 500px;
        }
        .instructions {
            color: #aaa;
            margin-top: 20px;
            font-size: 14px;
        }
        .loader {
            border: 4px solid #1a1a1a;
            border-top: 4px solid #00ff00;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <h1>🔑 Your Access Key</h1>
    <div id="container">
        <div class="loader"></div>
        <p>Loading your key...</p>
    </div>

    <script>
        // Get the key from the URL path
        const path = window.location.pathname;
        const key = path.split('/').pop();
        
        // Remove the key from the URL bar (without reloading)
        const cleanUrl = window.location.origin + window.location.pathname.replace(/\/[^\/]+$/, '/');
        if (window.history && window.history.replaceState) {
            window.history.replaceState({}, document.title, cleanUrl);
        }
        
        // Display the key
        const container = document.getElementById('container');
        if (key && key.length > 0 && key !== 'index.html' && key !== '') {
            container.innerHTML = `
                <div class="key-box">
                    <div class="key">${key}</div>
                </div>
                <div class="instructions">
                    <p>Copy this key and return to Discord.</p>
                    <p>Use <code>/redeem ${key}</code> to activate.</p>
                    <p style="color:#666; font-size:12px; margin-top:20px;">⏰ This key expires in 4 hours.</p>
                </div>
            `;
        } else {
            container.innerHTML = `
                <div class="key-box">
                    <div class="key" style="color:#ff4444;">⚠️ No Key Found</div>
                </div>
                <div class="instructions">
                    <p>Please complete the AdFly steps again.</p>
                </div>
            `;
        }
    </script>
</body>
</html>
