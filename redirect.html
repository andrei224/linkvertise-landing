<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redirecting...</title>
    <style>
        body {
            background: #0a0a0a;
            color: #00ff00;
            text-align: center;
            padding: 50px;
            font-family: Arial, sans-serif;
        }
        .loader {
            border: 4px solid #1a1a1a;
            border-top: 4px solid #00ff00;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .key-display {
            background: #1a1a1a;
            padding: 20px;
            border-radius: 10px;
            border: 1px solid #00ff00;
            display: inline-block;
            margin: 20px auto;
            font-size: 24px;
            font-family: monospace;
            word-break: break-all;
            max-width: 80%;
        }
    </style>
</head>
<body>
    <h1>🔑 Your Access Key</h1>
    <div id="keyContainer">
        <div class="loader"></div>
        <p>Loading your key...</p>
    </div>

    <script>
        // Get the key from the URL path
        const path = window.location.pathname;
        const key = path.split('/').pop();
        
        // Remove the key from the URL without reloading
        const cleanUrl = window.location.origin + window.location.pathname.replace(/\/[^\/]+$/, '/');
        window.history.replaceState({}, document.title, cleanUrl);
        
        // Display the key
        const container = document.getElementById('keyContainer');
        container.innerHTML = `
            <div class="key-display">${key}</div>
            <p style="color: #aaa;">Copy this key and return to Discord.</p>
            <p>Use <code>/redeem ${key}</code> to activate.</p>
            <p style="color: #666; font-size: 12px; margin-top: 20px;">⏰ This key expires in 4 hours.</p>
        `;
    </script>
</body>
</html>
