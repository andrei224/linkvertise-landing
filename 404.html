<!DOCTYPE html>
<html>
<head>
    <title>Your Access Key</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: #00ff00;
            text-align: center;
            padding: 50px;
        }
        .key-box {
            background: #1a1a1a;
            padding: 30px;
            border-radius: 10px;
            border: 2px solid #00ff00;
            display: inline-block;
            margin: 20px auto;
        }
        .key {
            font-size: 32px;
            font-weight: bold;
            letter-spacing: 4px;
            font-family: monospace;
            background: #000;
            padding: 20px 40px;
            border-radius: 5px;
            border: 1px solid #00ff00;
            word-break: break-all;
            max-width: 500px;
        }
        .instructions {
            color: #aaa;
            margin-top: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <h1>🔑 Your Access Key</h1>
    <div class="key-box">
        <div class="key" id="keyDisplay">Loading...</div>
    </div>
    <div class="instructions">
        <p>Copy this key and return to Discord.</p>
        <p>Use <code>/redeem YOUR_KEY</code> to activate.</p>
        <p style="color:#666; font-size:12px; margin-top:20px;">
            ⏰ This key expires in 4 hours.
        </p>
    </div>
    <script>
        // Get the key from the URL path (not parameters)
        const path = window.location.pathname;
        const key = path.split('/').pop(); // Gets the last part of the URL
        document.getElementById('keyDisplay').textContent = key;
    </script>
</body>
</html>
